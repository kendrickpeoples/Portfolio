<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kendrick's Portfolio</title>
</head>
<header>
    <nav>
        <h2>KDP</h2>
        <button onclick="window.location.href ='#contact';"">Contact Me</button>
    </nav>
</header>
<body>
    <main>
        <section class="top" id="top">
            <h1>Kendrick Peoples</h1>
            <h2>Front End Developer</h2>
            <div class="buttons">
                <button>About Me</button>
                <button>Hire Me</button>
            </div>
        </section>

        <section class="projects" id="projects">
            
        </section>

        <section class="contact" id="contact">
            <h1>Contact</h1>
            <p>Interested in working together? Contact me via email or LinkedIN</p>
            <form method="POST" class="form-area">
                <div class="msg-area">
                    <label for="msg">Message</label>
                    <textarea id="msg"></textarea>
                </div>
                <div class="details-area">
                    <label for="name">First Name</label>
                    <input type="text" name="" id="name">

                    <label for="l_name">Last Name</label>
                    <input type="text" name="" id="l_name">

                    <label for="email">Email</label>
                    <input type="email" name="" id="email">

                    <button type="submit">Submit</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
